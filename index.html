<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Formulário Completo</title>
</head>
<body>
    <h1>Formulário Completo</h1>
    <form>
       
        <fieldset>
            <legend>Dados Pessoais</legend>
            
            <label>Nome: 
                <input type="text">
            </label><br><br>
            
            <label>Sobrenome: 
                <input type="text">
            </label><br><br>
            
            <label>Email: 
                <input type="email">
            </label><br><br>
            
            <label>Telefone: 
                <input type="tel">
            </label><br><br>
            
            <label>Data de Nascimento: 
                <input type="date">
            </label>
        </fieldset>
        <br>

        <fieldset>
            <legend>Endereço</legend>
            
            <label>Rua: 
                <input type="text">
            </label><br><br>
            
            <label>Número: 
                <input type="number">
            </label><br><br>
            
            <label>Cidade: 
                <input type="text">
            </label><br><br>
            
            <label>Estado: 
                <input type="text">
            </label><br><br>
            
            <label>CEP: 
                <input type="number">
            </label>
        </fieldset>
        <br>

        <fieldset>
            <legend>Preferências</legend>
            
            <label>Cor Favorita: 
                <select name="cor">
                <option>--Nenhuma--</option>
                <option>Vermelho</option>
                <option>Amarelo</option>
                <option>Verde</option>
                <option>Azul</option>
                <option>Marrom</option>
                <option>Preto</option>
                <option>Branco</option>
                </select>
            </label><br>
            
            <label>Gênero: 
                <input type="radio" value="m" name="genero"> Masculino 
                <input type="radio" value="f" name="genero"> Feminino
            </label><br><br>
            
            <label>Interesses:</label><br>
            <input type="checkbox" value="esporte"> Esportes<br>
            <input type="checkbox" value="musica"> Música<br>
            <input type="checkbox" value="tecnologia"> Tecnologia
        </fieldset>
        <br>

        <fieldset>
            <legend>Upload de Arquivos</legend>
            
            <label>Escolha um arquivo: 
                <input type="text" value="Escolher arquivo"> Nenhum arquivo escolhido
            </label>
        </fieldset>
        <br>

        <fieldset>
            <legend>Informações de Login</legend>
            
            <label>Nome de Usuário: 
                <input type="text">
            </label><br><br>
            
            <label>Senha: 
                <input type="text">
            </label><br><br>
            
            <label>Confirmar Senha: 
                <input type="text">
            </label>
        </fieldset>
        <br>


        <input type="text" value="Enviar">

    </form>

</body>
</html>
